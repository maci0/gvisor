<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 250" font-family="Arial, Helvetica, sans-serif" font-size="12">
  <!-- Title -->
  <text x="260" y="20" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">ARM64 Page Tables (16K Granule)</text>

  <!-- L2 Table -->
  <rect x="20" y="40" width="220" height="90" rx="4" fill="#cfe2f3" stroke="#6d9eeb" stroke-width="1.5"/>
  <text x="130" y="60" text-anchor="middle" font-weight="bold" fill="#1155cc">L2 Table (root)</text>
  <text x="130" y="78" text-anchor="middle" font-size="11" fill="#3c78d8">2048 entries x 8B = 16K</text>
  <text x="130" y="94" text-anchor="middle" font-size="11" fill="#3c78d8">Each covers 32MB (1 &lt;&lt; 25)</text>
  <text x="130" y="110" text-anchor="middle" font-size="11" fill="#3c78d8">Points to L3 or invalid</text>
  <text x="130" y="126" text-anchor="middle" font-size="10" fill="#1155cc">One per address space</text>

  <!-- Arrow L2 -> L3 -->
  <line x1="240" y1="85" x2="280" y2="85" stroke="#333" stroke-width="1.5" marker-end="url(#pR)"/>

  <!-- L3 Table -->
  <rect x="280" y="40" width="220" height="90" rx="4" fill="#d9d2e9" stroke="#8e7cc3" stroke-width="1.5"/>
  <text x="390" y="60" text-anchor="middle" font-weight="bold" fill="#351c75">L3 Table (leaf)</text>
  <text x="390" y="78" text-anchor="middle" font-size="11" fill="#674ea7">2048 entries x 8B = 16K</text>
  <text x="390" y="94" text-anchor="middle" font-size="11" fill="#674ea7">Each maps one 16K page</text>
  <text x="390" y="110" text-anchor="middle" font-size="11" fill="#674ea7">Allocated on demand</text>
  <text x="390" y="126" text-anchor="middle" font-size="10" fill="#351c75">Recycled via free list</text>

  <!-- L3 Descriptor Detail -->
  <rect x="20" y="150" width="480" height="85" rx="4" fill="#fce5cd" stroke="#e69138" stroke-width="1"/>
  <text x="260" y="170" text-anchor="middle" font-weight="bold" fill="#783f04">L3 Page Descriptor</text>

  <!-- Descriptor fields as boxes -->
  <rect x="35" y="180" width="70" height="25" rx="2" fill="#fff2cc" stroke="#f1c232"/>
  <text x="70" y="197" text-anchor="middle" font-size="10" fill="#7f6000">IPA[51:14]</text>

  <rect x="110" y="180" width="35" height="25" rx="2" fill="#d9ead3" stroke="#6aa84f"/>
  <text x="127" y="197" text-anchor="middle" font-size="10" fill="#274e13">nG</text>

  <rect x="150" y="180" width="30" height="25" rx="2" fill="#d9ead3" stroke="#6aa84f"/>
  <text x="165" y="197" text-anchor="middle" font-size="10" fill="#274e13">AF</text>

  <rect x="185" y="180" width="30" height="25" rx="2" fill="#d9ead3" stroke="#6aa84f"/>
  <text x="200" y="197" text-anchor="middle" font-size="10" fill="#274e13">SH</text>

  <rect x="220" y="180" width="40" height="25" rx="2" fill="#d9ead3" stroke="#6aa84f"/>
  <text x="240" y="197" text-anchor="middle" font-size="10" fill="#274e13">attr</text>

  <rect x="265" y="180" width="50" height="25" rx="2" fill="#f4cccc" stroke="#cc4125"/>
  <text x="290" y="197" text-anchor="middle" font-size="10" font-weight="bold" fill="#990000">AP[2]</text>

  <rect x="320" y="180" width="50" height="25" rx="2" fill="#cfe2f3" stroke="#6d9eeb"/>
  <text x="345" y="197" text-anchor="middle" font-size="10" fill="#1155cc">table</text>

  <rect x="375" y="180" width="50" height="25" rx="2" fill="#cfe2f3" stroke="#6d9eeb"/>
  <text x="400" y="197" text-anchor="middle" font-size="10" fill="#1155cc">valid</text>

  <!-- Legend -->
  <text x="35" y="225" font-size="10" fill="#990000" font-weight="bold">AP[2]=0</text>
  <text x="85" y="225" font-size="10" fill="#555">read-write</text>
  <text x="170" y="225" font-size="10" fill="#990000" font-weight="bold">AP[2]=1</text>
  <text x="220" y="225" font-size="10" fill="#555">read-only (COW)</text>
  <text x="330" y="225" font-size="10" fill="#274e13" font-weight="bold">nG=1</text>
  <text x="365" y="225" font-size="10" fill="#555">non-Global (ASID-tagged)</text>

  <defs>
    <marker id="pR" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><path d="M0,0 L7,2.5 L0,5 Z" fill="#333"/></marker>
  </defs>
</svg>
